<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe by Trinanjana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/norwester" rel="stylesheet">
</head>
<body>
    <div class="status">
        <div class="timerbar"></div>
        <div class="statustext"></div>
    </div>

    <div class="boardblock">
        <div class="winningline"></div>
        <div class="board">
            <div class="grid 1"></div>
            <div class="grid 2"></div>
            <div class="grid 3"></div>
            <div class="grid 4"></div>
            <div class="grid 5"></div>
            <div class="grid 6"></div>
            <div class="grid 7"></div>
            <div class="grid 8"></div>
            <div class="grid 9"></div>
        </div>
    </div>

    <div class="drawbutton button">
        Draw
    </div>

    <div class="resign button">
        Resign
    </div>
    
    <div class="title score">
        Scoreboard
    </div>
    <div class="scorecontainer">
    <div class="player1 score">
        <div class="symbol">O</div>
        <div class="playername"></div>
        <div class="displayscore"></div>
    </div>
    <div class="player2 score">
        <div class="symbol">X</div>
        <div class="playername"></div>
        <div class="displayscore"></div>
    </div>
    </div>

    <div class="optionscontainer">
    <div class="rematch option">Rematch?</div>
    <div class="newgame option">New Game</div>
    </div>

    <div class="overlay"></div>
    
    <div class="namePopup">
        <p>Enter Player Names</p>
        <div class="nameinput">
            <div class="player1">
                <input type="text" placeholder="Player 1">
            </div>
            <div class="player2">
                <input type="text" placeholder="Player 2">
            </div>
        </div>

        <div class="namePopupButtons">
            <button class="skip buttons">Skip</button>
            <button class="continue buttons">Continue</button>
        </div>
    </div>

    <div class="alertPopup">
        <div class="question"></div>
        <div class="decision">
            <button class="yes buttons">Yes</button>
            <button class="no buttons">No</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
